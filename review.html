<!DOCTYPE html>
<html>
<head>
  <title>Review</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial;
      text-align: center;
    }

    canvas {
      border: 2px solid black;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>
  <h2>Review Drawing</h2>

  <button onclick="load()">Review</button>

  <canvas id="canvas" width="600" height="300"></canvas>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCwqKvYDttWfIMiCrlWCECumOds9YJlkjc",
      authDomain: "draw-97c31.firebaseapp.com",
      databaseURL: "https://draw-97c31-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "draw-97c31",
      storageBucket: "draw-97c31.firebasestorage.app",
      messagingSenderId: "536389001280",
      appId: "1:536389001280:web:e912c8da8b5a82999fffa5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const room = new URLSearchParams(location.search).get("room");

    window.load = async function () {
      if (!room) return alert("Missing room ID!");

      const leftSnap = await get(ref(db, "rooms/" + room + "/left"));
      const rightSnap = await get(ref(db, "rooms/" + room + "/right"));

      const left = leftSnap.val();
      const right = rightSnap.val();

      if (!left || !right) {
        return alert("Both players must save first!");
      }

      const leftImg = new Image();
      const rightImg = new Image();

      await Promise.all([
        new Promise(res => {
          leftImg.onload = res;
          leftImg.src = left;
        }),
        new Promise(res => {
          rightImg.onload = res;
          rightImg.src = right;
        })
      ]);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.drawImage(leftImg, 0, 0, 300, 300);
      ctx.drawImage(rightImg, 300, 0, 300, 300);
    };
  </script>
</body>
</html>
