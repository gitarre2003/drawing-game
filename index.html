<!DOCTYPE html>
<html>
<head>
  <title>Drawing Game</title>
</head>
<body>
  <h1>2-Player Drawing Game</h1>

  <p>Enter Room ID:</p>
  <input id="room" placeholder="e.g. room1">

  <br><br>

  <button onclick="go('left')">Player 1 (Left)</button>
  <button onclick="go('right')">Player 2 (Right)</button>
  <button onclick="go('review')">Review</button>
  <button onclick="clearAll()" style="background:red;color:white;">Clear ALL Rooms</button>

  <br><br><br>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 🔥 REPLACE WITH YOUR FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyCwqKvYDttWfIMiCrlWCECumOds9YJlkjc",
      authDomain: "draw-97c31.firebaseapp.com",
      databaseURL: "https://draw-97c31-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "draw-97c31",
      storageBucket: "draw-97c31.firebasestorage.app",
      messagingSenderId: "536389001280",
      appId: "1:536389001280:web:e912c8da8b5a82999fffa5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.go = function(page) {
      const room = document.getElementById("room").value;
      if (!room) {
        alert("Enter room ID!");
        return;
      }
      window.location.href = page + ".html?room=" + room;
    };

    // 🔥 CLEAR ALL DATA
    window.clearAll = async function() {
      const confirmClear = confirm("Are you sure? This will delete ALL rooms!");
      if (!confirmClear) return;

      try {
        await remove(ref(db, "rooms"));
        alert("All rooms cleared!");
      } catch (err) {
        alert("Error: " + err);
      }
    };
  </script>
</body>
</html>
