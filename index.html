<!DOCTYPE html>
<html>
<head>
  <title>Drawing Game</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial;
      text-align: center;
    }

    input {
      padding: 8px;
      margin: 10px;
      width: 200px;
      text-align: center;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      cursor: pointer;
    }

    .danger {
      background: red;
      color: white;
    }
  </style>
</head>

<body>
  <h1>2-Player Drawing Game</h1>

  <p>Enter Room ID</p>
  <input id="room" placeholder="e.g. room1">

  <div>
    <button onclick="go('left')">Player 1 (Left)</button>
    <button onclick="go('right')">Player 2 (Right)</button>
    <button onclick="go('review')">Review</button>
  </div>

  <br>

  <button class="danger" onclick="clearAll()">Clear ALL Rooms</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCwqKvYDttWfIMiCrlWCECumOds9YJlkjc",
      authDomain: "draw-97c31.firebaseapp.com",
      databaseURL: "https://draw-97c31-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "draw-97c31",
      storageBucket: "draw-97c31.firebasestorage.app",
      messagingSenderId: "536389001280",
      appId: "1:536389001280:web:e912c8da8b5a82999fffa5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.go = function(page) {
      const room = document.getElementById("room").value;
      if (!room) return alert("Enter room ID!");
      location.href = `${page}.html?room=${room}`;
    };

    window.clearAll = async function() {
      if (!confirm("Delete ALL rooms?")) return;
      await remove(ref(db, "rooms"));
      alert("All rooms cleared!");
    };
  </script>
</body>
</html>
