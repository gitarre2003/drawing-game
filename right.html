<!DOCTYPE html>
<html>
<head>
  <title>Right Player</title>
</head>
<body>
  <h2>Right Player</h2>

  <canvas id="canvas" width="300" height="300"
    style="border:1px solid black; touch-action: none;"></canvas>

  <br><br>
  <button onclick="save()">Save</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 🔥 REPLACE WITH YOUR CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyCwqKvYDttWfIMiCrlWCECumOds9YJlkjc",
      authDomain: "draw-97c31.firebaseapp.com",
      databaseURL: "https://draw-97c31-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "draw-97c31",
      storageBucket: "draw-97c31.firebasestorage.app",
      messagingSenderId: "536389001280",
      appId: "1:536389001280:web:e912c8da8b5a82999fffa5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    ctx.lineWidth = 3;
    ctx.lineCap = "round";

    let drawing = false;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      if (e.touches) {
        return {
          x: e.touches[0].clientX - rect.left,
          y: e.touches[0].clientY - rect.top
        };
      }
      return {
        x: e.offsetX,
        y: e.offsetY
      };
    }

    function start(e) {
      drawing = true;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
      if (!drawing) return;
      e.preventDefault();

      const pos = getPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }

    function stop() {
      drawing = false;
    }

    // Mouse
    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", draw);
    canvas.addEventListener("mouseup", stop);
    canvas.addEventListener("mouseleave", stop);

    // Touch
    canvas.addEventListener("touchstart", start);
    canvas.addEventListener("touchmove", draw);
    canvas.addEventListener("touchend", stop);

    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get("room");

    window.save = function() {
      if (!room) {
        alert("Missing room ID!");
        return;
      }
      const data = canvas.toDataURL("image/jpeg", 0.5);
      set(ref(db, "rooms/" + room + "/right"), data);
      alert("Saved!");
    };
  </script>
</body>
</html>
