<!DOCTYPE html>
<html>
<head>
  <title>Right Player</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial;
    }

    canvas {
      border: 2px solid black;
      touch-action: none;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>
  <h2>Right Player</h2>

  <canvas id="canvas"></canvas>

  <button onclick="save()">Save</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCwqKvYDttWfIMiCrlWCECumOds9YJlkjc",
      authDomain: "draw-97c31.firebaseapp.com",
      databaseURL: "https://draw-97c31-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "draw-97c31",
      storageBucket: "draw-97c31.firebasestorage.app",
      messagingSenderId: "536389001280",
      appId: "1:536389001280:web:e912c8da8b5a82999fffa5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 300;
    canvas.height = 300;

    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.strokeStyle = "black";

    let drawing = false;

    function pos(e) {
      const r = canvas.getBoundingClientRect();

      if (e.touches) {
        return {
          x: (e.touches[0].clientX - r.left) * (canvas.width / r.width),
          y: (e.touches[0].clientY - r.top) * (canvas.height / r.height)
        };
      }

      return {
        x: (e.clientX - r.left) * (canvas.width / r.width),
        y: (e.clientY - r.top) * (canvas.height / r.height)
      };
    }

    function start(e) {
      drawing = true;
      const p = pos(e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
    }

    function move(e) {
      if (!drawing) return;
      e.preventDefault();

      const p = pos(e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }

    function end() {
      drawing = false;
    }

    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", move);
    canvas.addEventListener("mouseup", end);
    canvas.addEventListener("mouseleave", end);

    canvas.addEventListener("touchstart", start, { passive: false });
    canvas.addEventListener("touchmove", move, { passive: false });
    canvas.addEventListener("touchend", end);

    const room = new URLSearchParams(location.search).get("room");

    window.save = function () {
      const data = canvas.toDataURL("image/png");
      set(ref(db, "rooms/" + room + "/right"), data);
      alert("Saved!");
    };
  </script>
</body>
</html>
