<!DOCTYPE html>
<html>
<head>
  <title>Right Player</title>
</head>
<body>
  <h2>Right Player</h2>

  <canvas id="canvas" width="300" height="300" style="border:1px solid black;"></canvas>
  <br><br>
  <button onclick="save()">Save</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCwqKvYDttWfIMiCrlWCECumOds9YJlkjc",
      authDomain: "draw-97c31.firebaseapp.com",
      databaseURL: "https://draw-97c31-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "draw-97c31",
      storageBucket: "draw-97c31.firebasestorage.app",
      messagingSenderId: "536389001280",
      appId: "1:536389001280:web:e912c8da8b5a82999fffa5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let drawing = false;

    canvas.onmousedown = () => drawing = true;
    canvas.onmouseup = () => drawing = false;

    canvas.onmousemove = (e) => {
      if (!drawing) return;
      ctx.fillRect(e.offsetX, e.offsetY, 2, 2);
    };

    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get("room");

    window.save = function() {
      const data = canvas.toDataURL("image/jpeg", 0.5);
      set(ref(db, "rooms/" + room + "/right"), data);
      alert("Saved!");
    };
  </script>
</body>
</html>
